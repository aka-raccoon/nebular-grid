---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: freyrarr
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.4.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: 'true'
        cronjob:
          schedule: 15 * * * *
        pod:
          imagePullSecrets:
            - name: private-ghcr
          securityContext:
            fsGroup: ${APP_GID}
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [65542]
        containers:
          main:
            image:
              repository: ghcr.io/aka-raccoon/freyrarr
              tag: 0.0.3@sha256:8a48d7a4147c3d6bc769cc17f54a0032c18be05b094f7bd68e266c4eda76bdd3
            env:
              DATA_DIR: /data/nas-media/downloads/freyrarr
              LIDARR_URL: http://lidarr.downloads.svc.cluster.local
              LIDARR_PORT: 8686
              LIDARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: freyrarr-secret
                    key: lidarr_api_key
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 1024Mi
            securityContext:
              runAsUser: ${APP_UID}
              runAsGroup: ${APP_GID}
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: latest@sha256:450a487b23cd460da99b025b32b22fbccd41e7f3a0b083d34326d5a4c88519b0
            env:
              VPN_SERVICE_PROVIDER: privado
              FIREWALL_DEBUG: true
              FIREWALL_INPUT_PORTS: 80
              FIREWALL_OUTBOUND_SUBNETS: 10.96.0.0/12,10.244.0.0/16  # Allow access to k8s subnets
              SERVER_CITIES: Amsterdam,Prague
            envFrom:
              - secretRef:
                  name: freyrarr-vpn-secret
            securityContext:
              capabilities:
                add: [NET_ADMIN]
              allowPrivilegeEscalation: false
    service:
      main:
        enabled: false
    ingress:
      main:
        enabled: false
    persistence:
      config:
        enabled: true
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /home/kah/.config
      media:
        type: nfs
        server: asc.${DOMAIN}
        path: /tank/media/downloads/freyrarr
        globalMounts:
          - path: /data/nas-media/downloads/freyrarr
